services:
  # Full-stack application (serves both API and frontend)
  - type: web
    name: sora
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false  # Add this manually in Render dashboard
      - key: PORT
        value: 10000
